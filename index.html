<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faisal Hanafi | Backend Engineer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --dark-color: #0f172a;
            --bg-darker: #020617;
            --accent-color: #10b981; 
            --particle-color: #2c527e; 
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-darker);
            color: #e2e8f0;
            scroll-behavior: smooth;
        }

        code, .mono { font-family: 'JetBrains Mono', monospace; }
        
        .navbar {
            background-color: rgba(2, 6, 23, 0.9) !important;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px 0;
            z-index: 1000;
        }
        
        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at top right, rgba(58, 123, 213, 0.15), transparent);
        }

        #tsparticles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }
        
        .text-highlight {
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Styling Cursor Typed.js */
        .typed-cursor {
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-left: 5px;
        }
        
        .card {
            background-color: #1e293b;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 30px -15px rgba(0, 210, 255, 0.3);
        }

        .badge-tech {
            background-color: rgba(255,255,255,0.05);
            color: var(--primary-color);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin: 4px;
        }

        .btn-primary-custom {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        footer { border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold mono" href="#">Han<span class="text-highlight">_</span></a>
    </div>
</nav>

<section id="home" class="hero-section">
    <div id="tsparticles"></div>
    
    <div class="container hero-content">
        <div class="row align-items-center">
            <div class="col-lg-8">
                <code class="text-highlight mb-3 d-block fs-5">> <span id="typed"></span></code>
                
                <h1 class="display-2 fw-bold text-light mb-4">Independent <br><span class="text-highlight">Backend Engineer</span></h1>
                <p class="lead mb-5 text-secondary fs-4" style="max-width: 600px;">
                    Specializing in high-performance systems with <span class="text-light">Go, Rust, and Python</span>. Focused on AI/RAG integration and secure architectures.
                </p>
                <div class="d-flex gap-3">
                    <a href="#projects" class="btn btn-primary-custom">View Architecture</a>
                    <a href="#about" class="btn btn-outline-light px-4 py-2 rounded-3 fw-bold" style="text-decoration: none;">Core Philosophy</a>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
<script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>

<script>
    var typed = new Typed('#typed', {
        strings: ['build.', 'break.', 'improve.', 'build. break. improve.'],
        typeSpeed: 80,
        backSpeed: 40,
        backDelay: 1500,
        startDelay: 500,
        loop: true,
        showCursor: true,
        cursorChar: '_'
    });
    tsParticles.load("tsparticles", {
        fpsLimit: 60,
        particles: {
            number: { value: 100, density: { enable: true, area: 800 } },
            color: { value: "#2c527e" }, 
            shape: { type: "circle" },
            opacity: { 
                value: 0.5, 
                random: true,
                anim: { enable: true, speed: 1, opacity_min: 0.1, sync: false }
            },
            size: { value: { min: 1, max: 3 }, random: true },
            links: {
                enable: true,
                distance: 160,
                color: "#2c527e", 
                opacity: 0.3, 
                width: 1.2
            },
            move: {
                enable: true,
                speed: 1.0, 
                direction: "none",
                random: true,
                outModes: { default: "out" }
            }
        },
        interactivity: {
            events: {
                onHover: { enable: true, mode: "grab" },
                resize: true
            },
            modes: {
                grab: { distance: 220, links: { opacity: 0.5 } } 
            }
        },
        retina_detect: true
    });
</script>
</body>
</html>
